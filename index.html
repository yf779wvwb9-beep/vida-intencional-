function useStorage(key, initial) {
  const [state, setState] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : initial; }
    catch { return initial; }
  });
  const set = useCallback((val) => {
    setState((prev) => {
      const next = typeof val === "function" ? val(prev) : val;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);
  return [state, set];
}

// ── INITIAL DATA ──────────────────────────────────────────────────

// ── CONTEXT ───────────────────────────────────────────────────────
const AppContext = createContext(null);

function AppProvider({ children }) {
  const todayKey = new Date().toISOString().slice(0,10);
  const [habits,   setHabits]   = useStorage("vi4_habits",   INITIAL_HABITS);
  const [goals,    setGoals]    = useStorage("vi4_goals",    INITIAL_GOALS);
  const [subtasks, setSubtasks] = useStorage("vi4_subtasks", INITIAL_SUBTASKS);
  const [checks,   setChecks]   = useStorage("vi4_checks",   {});
  const [library,  setLibrary]  = useStorage("vi4_library",  INITIAL_LIBRARY);
  const [diary,    setDiary]    = useStorage("vi6_diary",    []);
  const [health,   setHealth]   = useStorage("vi7_health",   { goal: 80, entries: [] });
  const [exams,    setExams]    = useStorage("vi8_exams",    []);

  const todayChecks = checks[todayKey] || {};

  const todayHabits = useMemo(() =>
    habits.map((h) => ({ ...h, done:!!todayChecks[h.id], goal:goals.find((g)=>g.id===h.goalId)||null })),
    [habits, goals, todayChecks]
  );

  // Monthly metrics: count how many times each habit was checked this calendar month
  const monthlyMetrics = useMemo(() => {
    const now = new Date();
    const y = now.getFullYear(), m = now.getMonth();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const result = {};
    habits.forEach((h) => {
      let done = 0;
      for (let d = 1; d <= daysInMonth; d++) {
        const dk = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        if (checks[dk]?.[h.id]) done++;
      }
      // target = targetPerWeek * weeks in month (approx)
      const target = Math.round((h.targetPerWeek||1) * (daysInMonth/7));
      result[h.id] = { done, target, pct: Math.round((done/target)*100) };
    });
    return result;
  }, [habits, checks]);

  // Goal progress = habit consistency (70%) + subtask completion (30%)
  const goalProgress = useMemo(() => {
    const result = {};
    goals.forEach((g) => {
      const gHabits = habits.filter((h) => h.goalId===g.id);
      const gSubs   = subtasks.filter((s) => s.goalId===g.id);
      let habitScore = 35;
      if (gHabits.length) {
        const avgPct = gHabits.reduce((acc,h) => acc+(monthlyMetrics[h.id]?.pct||0), 0) / gHabits.length;
        habitScore = Math.min(avgPct, 100) * 0.70;
      }
      let subScore = 0;
      if (gSubs.length) subScore = (gSubs.filter((s)=>s.done).length/gSubs.length)*30;
      result[g.id] = Math.round(habitScore+subScore);
    });
    return result;
  }, [goals, habits, subtasks, monthlyMetrics]);

  const toggleHabit = useCallback((id) => {
    setChecks((prev) => {
      const day = { ...(prev[todayKey]||{}) };
      day[id] = !day[id];
      return { ...prev, [todayKey]:day };
    });
  }, [todayKey, setChecks]);

  const toggleSubtask  = useCallback((id) => setSubtasks((p)=>p.map((s)=>s.id===id?{...s,done:!s.done}:s)), [setSubtasks]);
  const addGoal        = useCallback((g) => setGoals((p)=>[...p,{...g,id:`g${Date.now()}`}]), [setGoals]);
  const updateGoal     = useCallback((id,patch) => setGoals((p)=>p.map((g)=>g.id===id?{...g,...patch}:g)), [setGoals]);
  const deleteGoal     = useCallback((id) => { setGoals((p)=>p.filter((g)=>g.id!==id)); setSubtasks((p)=>p.filter((s)=>s.goalId!==id)); }, [setGoals,setSubtasks]);
  const addSubtask     = useCallback((s) => setSubtasks((p)=>[...p,{...s,id:`s${Date.now()}`,done:false}]), [setSubtasks]);
  const deleteSubtask  = useCallback((id) => setSubtasks((p)=>p.filter((s)=>s.id!==id)), [setSubtasks]);
  const addHabit       = useCallback((h) => setHabits((p)=>[...p,{...h,id:`h${Date.now()}`,targetPerWeek:h.targetPerWeek||1}]), [setHabits]);
  const updateHabit    = useCallback((id,patch) => setHabits((p)=>p.map((h)=>h.id===id?{...h,...patch}:h)), [setHabits]);
  const deleteHabit    = useCallback((id) => setHabits((p)=>p.filter((h)=>h.id!==id)), [setHabits]);
  const addMedia       = useCallback((m) => setLibrary((p)=>[...p,{...m,id:`b${Date.now()}`,rating:0}]), [setLibrary]);
  const updateMedia    = useCallback((id,patch) => setLibrary((p)=>p.map((b)=>b.id===id?{...b,...patch}:b)), [setLibrary]);
  const deleteMedia    = useCallback((id) => setLibrary((p)=>p.filter((b)=>b.id!==id)), [setLibrary]);

  const addDiaryEntry    = useCallback((e) => setDiary((p)=>[...p,{...e,id:`d${Date.now()}`}]), [setDiary]);
  const updateDiaryEntry = useCallback((id,patch) => setDiary((p)=>p.map((e)=>e.id===id?{...e,...patch}:e)), [setDiary]);
  const deleteDiaryEntry = useCallback((id) => setDiary((p)=>p.filter((e)=>e.id!==id)), [setDiary]);

  const addHealthEntry    = useCallback((e) => setHealth((p)=>({...p,entries:[...p.entries,{...e,id:`he${Date.now()}`,date:e.date||new Date().toISOString().slice(0,10)}]})), [setHealth]);
  const deleteHealthEntry = useCallback((id) => setHealth((p)=>({...p,entries:p.entries.filter((e)=>e.id!==id)})), [setHealth]);
  const setHealthGoal     = useCallback((goal) => setHealth((p)=>({...p,goal})), [setHealth]);
  const addExam           = useCallback((e) => setExams((p)=>[...p,{...e,id:`ex${Date.now()}`}]), [setExams]);
  const deleteExam        = useCallback((id) => setExams((p)=>p.filter((e)=>e.id!==id)), [setExams]);

  const doneCount     = todayHabits.filter((h)=>h.done).length;
  const totalCount    = todayHabits.length;
  const completionPct = totalCount ? Math.round((doneCount/totalCount)*100) : 0;

  // Streak: consecutive days with at least 1 habit checked
  const streak = useMemo(() => {
    let count = 0;
    let best  = 0;
    const today = new Date();
    for (let i = 0; i < 365; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() - i);
      const dk = d.toISOString().slice(0,10);
      const dc = checks[dk] || {};
      const anyDone = habits.some((h) => dc[h.id]);
      if (i === 0 && !anyDone) { /* today not done yet — don't break */ }
      else if (!anyDone) break;
      else count++;
    }
    // best streak ever
    let cur = 0;
    const allDays = Object.keys(checks).sort();
    allDays.forEach((dk) => {
      const dc = checks[dk] || {};
      if (habits.some((h) => dc[h.id])) { cur++; best = Math.max(best, cur); }
      else cur = 0;
    });
    return { count, best };
  }, [checks, habits]);

  const last7 = useMemo(()=>Array.from({length:7},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(6-i));
    const dk=d.toISOString().slice(0,10);
    const dc=checks[dk]||{};
    const done=habits.filter((h)=>dc[h.id]).length;
    return { key:dk, label:d.toLocaleDateString("pt-BR",{weekday:"short"}).slice(0,3), pct:habits.length?Math.round((done/habits.length)*100):0 };
  }),[checks,habits]);

  return (
    <AppContext.Provider value={{
      todayHabits,habits,goals,subtasks,library,diary,health,exams,checks,
      toggleHabit,toggleSubtask,doneCount,totalCount,completionPct,
      goalProgress,monthlyMetrics,last7,streak,todayKey,vision:VISION,
      addGoal,updateGoal,deleteGoal,
      addSubtask,deleteSubtask,
      addHabit,updateHabit,deleteHabit,
      addMedia,updateMedia,deleteMedia,
      addDiaryEntry,updateDiaryEntry,deleteDiaryEntry,
      addHealthEntry,deleteHealthEntry,setHealthGoal,
      addExam,deleteExam,
    }}>
      {children}
    </AppContext.Provider>
  );
}
const useApp = ()=>useContext(AppContext);

// ── PRIMITIVES ────────────────────────────────────────────────────
function ProgressRing({pct,size=60}){
  const r=(size-6)/2,circ=2*Math.PI*r,offset=circ-(pct/100)*circ;
  return(
    <svg width={size} height={size} style={{transform:"rotate(-90deg)",flexShrink:0}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.surfaceHigh} strokeWidth={4}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.gold} strokeWidth={4}
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        style={{transition:"stroke-dashoffset 0.5s ease"}}/>
    </svg>
  );
}
function MiniBar({pct,color,height=4}){
  return(
    <div style={{height,borderRadius:height/2,background:T.surfaceHigh,overflow:"hidden"}}>
      <div style={{height:"100%",borderRadius:height/2,background:color,width:`${Math.min(pct,100)}%`,transition:"width 0.6s ease"}}/>
    </div>
  );
}
function MetricBadge({done,target,color}){
  const pct=Math.round((done/target)*100);
  const ok=pct>=70;
  return(
    <div style={{display:"flex",alignItems:"center",gap:5,background:`${color}15`,borderRadius:8,padding:"3px 8px",flexShrink:0}}>
      <span style={{fontSize:12,fontWeight:700,color:ok?color:T.textSub}}>{done}<span style={{color:T.textMuted,fontWeight:400}}>/{target}</span></span>
      <span style={{fontSize:10,color:ok?color:T.textMuted}}>{pct}%</span>
    </div>
  );
}
const inp = {
  width:"100%",background:T.surfaceHigh,border:`1px solid ${T.textMuted}`,
  borderRadius:10,padding:"12px 14px",color:T.text,fontSize:14,
  outline:"none",boxSizing:"border-box",fontFamily:"Inter,sans-serif",
};
function Btn({children,onClick,variant="gold",style={}}){
  const vars={gold:{background:T.gold,color:"#0F1117"},ghost:{background:"transparent",color:T.textSub,border:`1px solid ${T.textMuted}`},danger:{background:`${T.danger}22`,color:T.danger}};
  return <button onClick={onClick} style={{border:"none",borderRadius:10,fontWeight:700,fontSize:13,padding:"8px 14px",cursor:"pointer",fontFamily:"Inter,sans-serif",...vars[variant],...style}}>{children}</button>;
}

// ── HABIT ROW ─────────────────────────────────────────────────────
function HabitRow({habit,onToggle,showGoal,monthlyMetrics,onDelete}){
  const color=T.sectors[habit.sector];
  const m=monthlyMetrics?.[habit.id];
  return(
    <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:10,background:habit.done?`${color}12`:"transparent",transition:"background 0.2s",position:"relative"}}>
      {habit.done&&<div style={{position:"absolute",left:0,top:6,bottom:6,width:3,borderRadius:2,background:`linear-gradient(to bottom,${T.gold},${color})`}}/>}
      <div onClick={()=>onToggle(habit.id)} style={{width:22,height:22,borderRadius:6,flexShrink:0,cursor:"pointer",border:`2px solid ${habit.done?color:T.textMuted}`,background:habit.done?color:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>
        {habit.done&&<span style={{color:"#fff",fontSize:13,fontWeight:700}}>✓</span>}
      </div>
      <div style={{flex:1,minWidth:0}} onClick={()=>onToggle(habit.id)}>
        <p style={{margin:0,fontSize:14,color:habit.done?T.textSub:T.text,textDecoration:habit.done?"line-through":"none",lineHeight:1.3,cursor:"pointer"}}>{habit.label}</p>
        {showGoal&&habit.goal&&<p style={{margin:"2px 0 0",fontSize:11,color,lineHeight:1.2}}>↳ {habit.goal.title}</p>}
      </div>
      {m&&<MetricBadge done={m.done} target={m.target} color={color}/>}
      {onDelete&&<button onClick={()=>onDelete(habit.id)} style={{background:"none",border:"none",color:T.textMuted,fontSize:16,cursor:"pointer",padding:"0 2px",flexShrink:0}}>×</button>}
    </div>
  );
}

// ── HOME ──────────────────────────────────────────────────────────
function HomeScreen(){
  const {todayHabits,toggleHabit,doneCount,totalCount,completionPct,goals,goalProgress,monthlyMetrics,streak}=useApp();
  const now=new Date();
  const dayName=now.toLocaleDateString("pt-BR",{weekday:"long"});
  const dateStr=now.toLocaleDateString("pt-BR",{day:"numeric",month:"long"});
  const greeting=now.getHours()<12?"Bom dia":now.getHours()<18?"Boa tarde":"Boa noite";
  const sectors=[...new Set(todayHabits.map((h)=>h.sector))];
  const goalsBrickedToday=goals.filter((g)=>todayHabits.some((h)=>h.goalId===g.id&&h.done));

  // Streak fire intensity
  const fireEmoji = streak.count >= 30 ? "🔥🔥🔥" : streak.count >= 14 ? "🔥🔥" : streak.count >= 3 ? "🔥" : "✦";
  const streakMsg = streak.count === 0 ? "Comece hoje" : streak.count === 1 ? "1 dia — continue amanhã!" : `${streak.count} dias seguidos`;

  return(
    <div style={{paddingBottom:90}}>

        <p style={{fontSize:12,color:T.textSub,margin:0,textTransform:"capitalize",letterSpacing:"0.05em"}}>{dayName}, {dateStr}</p>

            border:`1px solid ${T.gold}44`,

            </div>
          </div>
        </div>
      )}

      {/* Progress card */}
      <div style={{padding:"0 12px 14px"}}>
        <div style={{background:T.surface,borderRadius:18,padding:16}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{position:"relative"}}>
              <ProgressRing pct={completionPct} size={62}/>
              <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:T.gold}}>{completionPct}%</div>
            </div>
            <div style={{flex:1}}>
              <p style={{margin:0,fontSize:20,fontWeight:700,color:T.text}}>{doneCount}/{totalCount} hábitos</p>
              <p style={{margin:"2px 0 0",fontSize:12,color:T.textSub}}>
                {completionPct===100?"🔥 Dia completo!":doneCount===0?"Coloque o primeiro tijolo hoje":`${totalCount-doneCount} tijolos restantes`}
              </p>
            </div>
          </div>
          {goalsBrickedToday.length>0&&(
            <div style={{marginTop:14,paddingTop:12,borderTop:`1px solid ${T.surfaceHigh}`}}>
              <p style={{margin:"0 0 8px",fontSize:11,color:T.textMuted,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase"}}>Obras que avançaram hoje</p>
              {goalsBrickedToday.map((g)=>{
                const color=T.sectors[g.sector],pct=goalProgress[g.id]||0;
                return(
                  <div key={g.id} style={{marginBottom:8}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>

                      <span style={{fontSize:12,fontWeight:700,color,marginLeft:8}}>{pct}%</span>

      <div style={{background:T.surface,borderRadius:20,margin:"0 12px",overflow:"hidden"}}>

          const color=T.sectors[sector];

              <div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 16px 4px"}}>
                <span style={{fontSize:14,color,fontWeight:700}}>{SECTOR_ICONS[sector]}</span>
                <span style={{fontSize:11,fontWeight:700,letterSpacing:"0.1em",color:T.textSub,textTransform:"uppercase",flex:1}}>{SECTOR_LABELS[sector]}</span>
                <span style={{fontSize:11,color:done===sh.length?color:T.textMuted}}>{done}/{sh.length}</span>
              </div>
              {sh.map((h)=><HabitRow key={h.id} habit={h} onToggle={toggleHabit} showGoal monthlyMetrics={monthlyMetrics}/>)}
            </div>
          );
        })}

      <div style={{padding:"14px 12px 0"}}>
        <div style={{background:T.surface,borderRadius:16,padding:16,borderLeft:`3px solid ${T.gold}`}}>
          <p style={{margin:0,fontSize:11,color:T.gold,fontWeight:700,letterSpacing:"0.08em"}}>PALAVRA DO DIA</p>
          <p style={{margin:"8px 0 4px",fontSize:15,color:T.text,fontFamily:"'Playfair Display',serif",lineHeight:1.6}}>"Tudo posso naquele que me fortalece."</p>
          <p style={{margin:0,fontSize:12,color:T.textSub}}>Filipenses 4:13</p>
        </div>
      </div>

// ── GOAL CARD ─────────────────────────────────────────────────────
function GoalCard({goal,onUpdate,onDelete,habits,subtasks,todayHabits,goalProgress,monthlyMetrics,onAddSubtask,onToggleSubtask,onDeleteSubtask,onAddHabit,onUpdateHabit,onDeleteHabit}){
  const [mode,setMode]=useState(null);
  const [editForm,setEditForm]=useState({title:goal.title,deadline:goal.deadline,sector:goal.sector});
  const [newSub,setNewSub]=useState("");
  const [newHabit,setNewHabit]=useState({label:"",targetPerWeek:4});
  const color=T.sectors[goal.sector];
  const pct=goalProgress[goal.id]||0;
  const gSubs=subtasks.filter((s)=>s.goalId===goal.id);
  const gHabits=habits.filter((h)=>h.goalId===goal.id);
  const doneTodayCount=todayHabits.filter((h)=>h.goalId===goal.id&&h.done).length;
  const subsDone=gSubs.filter((s)=>s.done).length;

  return(
    <div style={{background:T.surface,borderRadius:16,marginBottom:10,overflow:"hidden",borderTop:`3px solid ${color}`}}>
      {/* Header */}
      <div style={{padding:"14px 14px 12px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
          <p style={{margin:0,fontSize:15,color:T.text,fontWeight:600,flex:1,lineHeight:1.3}}>{goal.title}</p>
          <span style={{fontSize:18,fontWeight:700,color,marginLeft:10,flexShrink:0}}>{pct}%</span>
        </div>
        <MiniBar pct={pct} color={color} height={5}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:8,alignItems:"center",flexWrap:"wrap",gap:4}}>
          <span style={{fontSize:11,color:T.textMuted}}>
            {gHabits.length} hábito{gHabits.length!==1?"s":""} · {subsDone}/{gSubs.length} submetas
            {goal.deadline?` · até ${new Date(goal.deadline+"T12:00:00").toLocaleDateString("pt-BR",{day:"numeric",month:"short"})}` :""}
          </span>
          {doneTodayCount>0&&<span style={{fontSize:11,color,fontWeight:700}}>🧱 {doneTodayCount} hoje</span>}
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",borderTop:`1px solid ${T.surfaceHigh}`,overflowX:"auto"}}>
        {[{id:"edit",label:"✎ Editar"},{id:"subtasks",label:`◈ Submetas (${gSubs.length})`},{id:"habits",label:`◉ Hábitos (${gHabits.length})`}].map((btn)=>(
          <button key={btn.id} onClick={()=>setMode(mode===btn.id?null:btn.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"9px 6px",fontSize:11,fontWeight:700,color:mode===btn.id?color:T.textSub,borderBottom:mode===btn.id?`2px solid ${color}`:"2px solid transparent",whiteSpace:"nowrap",transition:"color 0.2s"}}>{btn.label}</button>
        ))}
        <button onClick={()=>{if(window.confirm("Excluir esta meta?"))onDelete(goal.id);}} style={{background:"none",border:"none",cursor:"pointer",padding:"9px 10px",fontSize:14,color:T.textMuted,borderLeft:`1px solid ${T.surfaceHigh}`}}>🗑</button>
      </div>

      {/* Edit */}
      {mode==="edit"&&(
        <div style={{padding:14,borderTop:`1px solid ${T.surfaceHigh}`,display:"flex",flexDirection:"column",gap:8}}>
          <select value={editForm.sector} onChange={(e)=>setEditForm({...editForm,sector:e.target.value})} style={inp}>
            {Object.entries(SECTOR_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
          </select>
          <input value={editForm.title} onChange={(e)=>setEditForm({...editForm,title:e.target.value})} placeholder="Título" style={inp}/>
          <input type="date" value={editForm.deadline} onChange={(e)=>setEditForm({...editForm,deadline:e.target.value})} style={inp}/>
          <div style={{display:"flex",gap:8}}>
            <Btn onClick={()=>{if(editForm.title){onUpdate(goal.id,editForm);setMode(null);}}} style={{flex:1,padding:10}}>Salvar</Btn>
            <Btn onClick={()=>setMode(null)} variant="ghost" style={{flex:1,padding:10}}>Cancelar</Btn>
          </div>
        </div>
      )}

      {/* Submetas */}
      {mode==="subtasks"&&(
        <div style={{padding:14,borderTop:`1px solid ${T.surfaceHigh}`}}>
          <p style={{margin:"0 0 10px",fontSize:11,color:T.textSub,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase"}}>Marcos do caminho</p>
          {gSubs.length===0&&<p style={{fontSize:13,color:T.textMuted,marginBottom:10}}>Nenhum marco ainda.</p>}
          {gSubs.map((s)=>(
            <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <div onClick={()=>onToggleSubtask(s.id)} style={{width:20,height:20,borderRadius:5,flexShrink:0,cursor:"pointer",border:`2px solid ${s.done?color:T.textMuted}`,background:s.done?color:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>
                {s.done&&<span style={{color:"#fff",fontSize:12,fontWeight:700}}>✓</span>}
              </div>
              <span style={{flex:1,fontSize:14,color:s.done?T.textMuted:T.text,textDecoration:s.done?"line-through":"none"}}>{s.title}</span>
              <button onClick={()=>onDeleteSubtask(s.id)} style={{background:"none",border:"none",color:T.textMuted,fontSize:16,cursor:"pointer",padding:"0 2px"}}>×</button>
            </div>
          ))}
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <input value={newSub} onChange={(e)=>setNewSub(e.target.value)}
              onKeyDown={(e)=>{if(e.key==="Enter"&&newSub){onAddSubtask({goalId:goal.id,title:newSub});setNewSub("");}}}
              placeholder="Novo marco..." style={{...inp,flex:1,padding:"10px 12px"}}/>
            <Btn onClick={()=>{if(newSub){onAddSubtask({goalId:goal.id,title:newSub});setNewSub("");}}} style={{padding:"10px 14px"}}>+</Btn>
          </div>
        </div>
      )}

      {/* Hábitos */}
      {mode==="habits"&&(
        <div style={{padding:14,borderTop:`1px solid ${T.surfaceHigh}`}}>
          <p style={{margin:"0 0 10px",fontSize:11,color:T.textSub,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase"}}>Tijolos diários desta obra</p>
          {gHabits.length===0&&<p style={{fontSize:13,color:T.textMuted,marginBottom:10}}>Nenhum hábito vinculado.</p>}
          {gHabits.map((h)=>{
            const m=monthlyMetrics[h.id];
            const hColor=T.sectors[h.sector];
            return(
              <div key={h.id} style={{marginBottom:10,background:T.surfaceHigh,borderRadius:10,padding:"10px 12px"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <div style={{width:8,height:8,borderRadius:2,flexShrink:0,background:todayHabits.find((t)=>t.id===h.id)?.done?hColor:T.textMuted}}/>
                  <span style={{flex:1,fontSize:14,color:T.text,fontWeight:500}}>{h.label}</span>
                  <button onClick={()=>onDeleteHabit(h.id)} style={{background:"none",border:"none",color:T.textMuted,fontSize:15,cursor:"pointer",padding:0}}>×</button>
                </div>
                {/* Monthly metric */}
                {m&&(
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{flex:1}}>
                      <MiniBar pct={m.pct} color={hColor} height={4}/>
                    </div>
                    <span style={{fontSize:12,fontWeight:700,color:m.pct>=70?hColor:T.textSub,flexShrink:0}}>
                      {m.done}/{m.target} este mês
                    </span>
                  </div>
                )}
                {/* Target frequency editor */}
                <div style={{display:"flex",alignItems:"center",gap:6,marginTop:8}}>
                  <span style={{fontSize:11,color:T.textMuted}}>Meta:</span>
                  <select value={h.targetPerWeek} onChange={(e)=>onUpdateHabit(h.id,{targetPerWeek:Number(e.target.value)})}
                    style={{background:T.bg,border:`1px solid ${T.textMuted}`,borderRadius:6,padding:"3px 6px",color:T.text,fontSize:12,outline:"none"}}>
                    {[1,2,3,4,5,6,7].map((n)=><option key={n} value={n}>{n}x/semana</option>)}
                  </select>
                </div>
              </div>
            );
          })}
          {/* Add habit */}
          <div style={{marginTop:8,background:T.surfaceHigh,borderRadius:10,padding:12}}>
            <input value={newHabit.label} onChange={(e)=>setNewHabit({...newHabit,label:e.target.value})}
              placeholder="Nome do hábito..." style={{...inp,background:T.bg,marginBottom:8,padding:"10px 12px"}}/>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:12,color:T.textMuted,flexShrink:0}}>Frequência:</span>
              <select value={newHabit.targetPerWeek} onChange={(e)=>setNewHabit({...newHabit,targetPerWeek:Number(e.target.value)})}
                style={{background:T.bg,border:`1px solid ${T.textMuted}`,borderRadius:6,padding:"6px 10px",color:T.text,fontSize:13,outline:"none",flex:1}}>
                {[1,2,3,4,5,6,7].map((n)=><option key={n} value={n}>{n}x por semana</option>)}
              </select>
              <Btn onClick={()=>{if(newHabit.label){onAddHabit({label:newHabit.label,goalId:goal.id,sector:goal.sector,targetPerWeek:newHabit.targetPerWeek});setNewHabit({label:"",targetPerWeek:4});}}} style={{padding:"8px 14px"}}>+</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

            <Btn onClick={()=>setAdding(false)} variant="ghost" style={{flex:1,padding:11}}>Cancelar</Btn>

const MOODS = [
  { id:"excelente", label:"Excelente", emoji:"🔥", color:"#C9A84C" },
  { id:"bem",       label:"Bem",       emoji:"😊", color:"#5CB88A" },
  { id:"neutro",    label:"Neutro",    emoji:"😐", color:"#7A8099" },
  { id:"cansado",   label:"Cansado",   emoji:"😔", color:"#A07BE0" },
  { id:"dificil",   label:"Difícil",   emoji:"⛈",  color:"#E05C5C" },
];

function DiaryScreen(){
  const {diary,goals,addDiaryEntry,updateDiaryEntry,deleteDiaryEntry,todayKey,doneCount,totalCount,completionPct}=useApp();
  const [writing,setWriting]=useState(false);
  const [editing,setEditing]=useState(null);
  const [search,setSearch]=useState("");
  const [form,setForm]=useState({
    date: todayKey,
    mood: "bem",
    title: "",
    text: "",
    gratitude: "",
    goalId: "",
    intention: "",
  });

  const sorted=[...diary].sort((a,b)=>b.date.localeCompare(a.date));
  const filtered=search ? sorted.filter((e)=>
    e.text?.toLowerCase().includes(search.toLowerCase()) ||
    e.title?.toLowerCase().includes(search.toLowerCase()) ||
    e.gratitude?.toLowerCase().includes(search.toLowerCase())
  ) : sorted;

  const todayEntry=diary.find((e)=>e.date===todayKey);

  const openNew=()=>{
    setForm({date:todayKey,mood:"bem",title:"",text:"",gratitude:"",goalId:"",intention:""});
    setEditing(null);
    setWriting(true);
  };
  const openEdit=(e)=>{
    setForm({...e});
    setEditing(e.id);
    setWriting(true);
  };
  const save=()=>{
    if(!form.text && !form.gratitude) return;
    if(editing) { updateDiaryEntry(editing,form); }
    else { addDiaryEntry(form); }
    setWriting(false);
    setEditing(null);
  };

  const moodOf=(id)=>MOODS.find((m)=>m.id===id)||MOODS[1];

  return(
    <div style={{paddingBottom:90}}>
      <div style={{padding:"28px 20px 16px",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>

          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:T.text,margin:0}}>Diário</h2>
          <p style={{fontSize:13,color:T.textSub,margin:"4px 0 0"}}>
            {diary.length} {diary.length===1?"entrada":"entradas"} · sua história em construção
          </p>
        </div>
        {!todayEntry
          ? <Btn onClick={openNew}>✍ Hoje</Btn>
          : <Btn onClick={()=>openEdit(todayEntry)} variant="ghost">✎ Editar</Btn>
        }
      </div>

      {/* Today prompt if no entry yet */}
      {!todayEntry && !writing && (
        <div style={{margin:"0 12px 14px",background:`linear-gradient(135deg,${T.surface},#1E2438)`,borderRadius:16,padding:20,borderTop:`3px solid ${T.gold}`}}>
          <p style={{margin:"0 0 6px",fontSize:13,color:T.gold,fontWeight:700,letterSpacing:"0.06em"}}>REFLEXÃO DO DIA</p>
          <p style={{margin:"0 0 14px",fontSize:15,color:T.text,fontFamily:"'Playfair Display',serif",lineHeight:1.6}}>
            "Como foi hoje? O que você aprendeu? O que agradecer?"
          </p>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <span style={{fontSize:12,color:T.textSub}}>{completionPct}% dos hábitos concluídos hoje</span>
            <span style={{fontSize:12,color:T.gold,fontWeight:700}}>{doneCount}/{totalCount} hábitos</span>
          </div>
          <Btn onClick={openNew} style={{width:"100%",padding:12}}>Escrever reflexão de hoje</Btn>
        </div>
      )}

      {/* Write / Edit form */}
      {writing && (
        <div style={{margin:"0 12px 14px",background:T.surface,borderRadius:16,padding:16}}>
          <p style={{margin:"0 0 14px",fontSize:12,fontWeight:700,color:T.gold,letterSpacing:"0.08em",textTransform:"uppercase"}}>
            {editing?"Editar entrada":"Nova entrada"}
          </p>

          {/* Date */}
          <input type="date" value={form.date}
            onChange={(e)=>setForm({...form,date:e.target.value})}
            style={{...inp,marginBottom:10}}/>

          {/* Mood picker */}
          <p style={{margin:"0 0 8px",fontSize:11,color:T.textSub,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase"}}>Como foi o dia?</p>
          <div style={{display:"flex",gap:6,marginBottom:14}}>
            {MOODS.map((m)=>(
              <button key={m.id} onClick={()=>setForm({...form,mood:m.id})} style={{
                flex:1,background:form.mood===m.id?`${m.color}22`:"transparent",
                border:`1px solid ${form.mood===m.id?m.color:T.textMuted}`,
                borderRadius:10,padding:"8px 4px",cursor:"pointer",
                display:"flex",flexDirection:"column",alignItems:"center",gap:3,
              }}>
                <span style={{fontSize:18}}>{m.emoji}</span>
                <span style={{fontSize:9,color:form.mood===m.id?m.color:T.textMuted,fontWeight:form.mood===m.id?700:400}}>{m.label}</span>
              </button>
            ))}
          </div>

          {/* Title optional */}
          <input placeholder="Título (opcional)" value={form.title}
            onChange={(e)=>setForm({...form,title:e.target.value})}
            style={{...inp,marginBottom:10}}/>

          {/* Gratitude */}
          <p style={{margin:"0 0 6px",fontSize:11,color:T.textSub,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase"}}>Gratidão</p>
          <textarea placeholder="Pelo que você é grato hoje?" value={form.gratitude}
            onChange={(e)=>setForm({...form,gratitude:e.target.value})}
            rows={2} style={{...inp,resize:"none",marginBottom:10}}/>

          {/* Reflection */}
          <p style={{margin:"0 0 6px",fontSize:11,color:T.textSub,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase"}}>Reflexão</p>

          {/* Intention */}
          <p style={{margin:"0 0 6px",fontSize:11,color:T.textSub,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase"}}>Intenção para amanhã</p>
          <textarea placeholder="O que farei diferente amanhã?" value={form.intention}

          </div>
        </div>
      )}

      {/* Search */}
      {diary.length > 3 && !writing && (
        <div style={{padding:"0 12px 12px"}}>
          <input placeholder="🔍 Buscar nas entradas..." value={search}
            onChange={(e)=>setSearch(e.target.value)}
            style={{...inp}}/>
        </div>
      )}

      {/* Entries timeline */}
      <div style={{padding:"0 12px"}}>
        {filtered.length===0 && !writing && (
          <div style={{background:T.surface,borderRadius:16,padding:24,textAlign:"center"}}>
            <p style={{fontSize:32,margin:"0 0 8px"}}>📖</p>
            <p style={{color:T.textMuted,fontSize:14}}>Sua história começa aqui.</p>
            <p style={{color:T.textSub,fontSize:13,marginTop:4}}>Escreva sua primeira reflexão.</p>
          </div>
        )}
        {filtered.map((e,i)=>{
          const mood=moodOf(e.mood);
          const isToday=e.date===todayKey;
          return(
            <div key={e.id} style={{
              background:T.surface,borderRadius:16,padding:16,marginBottom:12,
              borderLeft:`3px solid ${mood.color}`,
              opacity: editing===e.id ? 0.5 : 1,
            }}>
              {/* Header */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>

                    <p style={{margin:0,fontSize:12,fontWeight:700,color:mood.color}}>{mood.label}</p>
                    <p style={{margin:0,fontSize:11,color:T.textMuted}}>
                      {isToday?"Hoje — ":""}{new Date(e.date+"T12:00:00").toLocaleDateString("pt-BR",{weekday:"short",day:"numeric",month:"short"})}
                    </p>
                  </div>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>openEdit(e)} style={{background:"none",border:"none",color:T.textMuted,fontSize:14,cursor:"pointer",padding:"0 4px"}}>✎</button>

                </div>

              {/* Title */}
              {e.title && (
                <p style={{margin:"0 0 8px",fontSize:16,fontWeight:700,color:T.text,fontFamily:"'Playfair Display',serif",lineHeight:1.3}}>{e.title}</p>
              )}

              {/* Gratitude */}
              {e.gratitude && (
                <div style={{background:`${T.gold}12`,borderRadius:10,padding:"8px 12px",marginBottom:8}}>
                  <p style={{margin:"0 0 3px",fontSize:10,fontWeight:700,color:T.gold,letterSpacing:"0.08em"}}>GRATIDÃO</p>
                  <p style={{margin:0,fontSize:13,color:T.text,lineHeight:1.5}}>{e.gratitude}</p>

              {/* Text */}
              {e.text && (

              {/* Intention */}
              {e.intention && (
                <div style={{borderTop:`1px solid ${T.surfaceHigh}`,paddingTop:8,marginTop:4}}>
                  <p style={{margin:"0 0 3px",fontSize:10,fontWeight:700,color:T.sectors.espiritual,letterSpacing:"0.08em"}}>INTENÇÃO PARA AMANHÃ</p>
                  <p style={{margin:0,fontSize:13,color:T.textSub,lineHeight:1.5,fontStyle:"italic"}}>{e.intention}</p>
                </div>

            </div>
          );
        })}
      </div>
    </div>
  );
}

  {id:"glicose",    label:"Glicose",         unit:"mg/dL", ref:"70–99"},
  {id:"colesterol", label:"Colesterol Total", unit:"mg/dL", ref:"<200"},
  {id:"hdl",        label:"HDL",             unit:"mg/dL", ref:">40"},
  {id:"ldl",        label:"LDL",             unit:"mg/dL", ref:"<130"},
  {id:"triglicerides",label:"Triglicerídeos",unit:"mg/dL", ref:"<150"},
  {id:"hemoglobina",label:"Hemoglobina",     unit:"g/dL",  ref:"13.5–17.5"},
  {id:"tsh",        label:"TSH",             unit:"mUI/L", ref:"0.4–4.0"},
  {id:"vitamina_d", label:"Vitamina D",      unit:"ng/mL", ref:">30"},
  {id:"acido_urico",label:"Ácido Úrico",     unit:"mg/dL", ref:"3.5–7.2"},
  {id:"creatinina", label:"Creatinina",      unit:"mg/dL", ref:"0.7–1.3"},
  {id:"outro",      label:"Outro",           unit:"",      ref:""},
];

function HealthScreen(){
  const {health,exams,addHealthEntry,deleteHealthEntry,setHealthGoal,addExam,deleteExam,habits,todayHabits}=useApp();
  const [tab,setTab]=useState("corpo"); // corpo | exames | ia
  const [adding,setAdding]=useState(false);
  const [addingExam,setAddingExam]=useState(false);
  const [aiAnalysis,setAiAnalysis]=useState(null);
  const [aiLoading,setAiLoading]=useState(false);
  const [editGoal,setEditGoal]=useState(false);
  const [goalInput,setGoalInput]=useState(String(health.goal));
  const [form,setForm]=useState({date:new Date().toISOString().slice(0,10),weight:"",waist:"",hip:"",bp_sys:"",bp_dia:"",notes:""});
  const [examForm,setExamForm]=useState({date:new Date().toISOString().slice(0,10),marker:"glicose",value:"",unit:"",notes:"",customName:""});

  const entries=[...health.entries].sort((a,b)=>b.date.localeCompare(a.date));
  const weightEntries=entries.filter((e)=>e.weight).reverse(); // asc for chart
  const latest=entries[0];
  const startWeight=weightEntries[0]?.weight;
  const currentWeight=weightEntries[weightEntries.length-1]?.weight;
  const lost=startWeight&&currentWeight ? (startWeight-currentWeight).toFixed(1) : null;
  const toGoal=currentWeight ? (currentWeight-health.goal).toFixed(1) : null;

  // Mini SVG line chart for weight
  const chartW=320, chartH=100;
  const WeightChart=()=>{
    if(weightEntries.length<2) return(
      <div style={{height:chartH,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <p style={{fontSize:12,color:T.textMuted}}>Registre pelo menos 2 pesagens para ver o gráfico</p>
      </div>
    );
    const weights=weightEntries.map((e)=>Number(e.weight));
    const min=Math.min(...weights)-1, max=Math.max(...weights)+1;
    const pts=weights.map((w,i)=>{
      const x=(i/(weights.length-1))*(chartW-20)+10;
      const y=chartH-((w-min)/(max-min))*(chartH-20)-10;
      return {x,y,w};
    });
    const path=pts.map((p,i)=>`${i===0?"M":"L"} ${p.x} ${p.y}`).join(" ");
    const goalY=chartH-((health.goal-min)/(max-min))*(chartH-20)-10;
    return(
      <svg width="100%" viewBox={`0 0 ${chartW} ${chartH}`} style={{overflow:"visible"}}>
        {/* Goal line */}
        {health.goal>=min&&health.goal<=max&&(
          <>
            <line x1={10} y1={goalY} x2={chartW-10} y2={goalY} stroke={T.success} strokeWidth={1} strokeDasharray="4 3" opacity={0.6}/>

Hábitos de saúde: ${healthHabits.map((h)=>h.label).join(", ")||"não informados"}`;

    </div>

// ── REVISÃO SEMANAL ───────────────────────────────────────────────
function WeeklyReviewScreen(){
  const {habits,goals,checks,diary,goalProgress,streak,todayKey,health,exams}=useApp();
  const [aiReview,setAiReview]=useState(null);
  const [loading,setLoading]=useState(false);

  // Build last 7 days data
  const last7=useMemo(()=>Array.from({length:7},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(6-i));
    const dk=d.toISOString().slice(0,10);
    const dc=checks[dk]||{};
    const done=habits.filter((h)=>dc[h.id]).length;
    const dayName=d.toLocaleDateString("pt-BR",{weekday:"short"});
    return {key:dk, dayName, done, total:habits.length, pct:habits.length?Math.round((done/habits.length)*100):0};
  }),[habits,checks]);

  const weekDone   = last7.reduce((a,d)=>a+d.done,0);
  const weekTarget = habits.length*7;
  const weekPct    = weekTarget ? Math.round((weekDone/weekTarget)*100) : 0;
  const perfectDays= last7.filter((d)=>d.pct===100).length;
  const zeroDays   = last7.filter((d)=>d.pct===0).length;

  // Goals that got bricks this week
  const goalsWithBricks=goals.filter((g)=>
    last7.some((d)=>habits.filter((h)=>h.goalId===g.id).some((h)=>(checks[d.key]||{})[h.id]))
  );
  const goalsNeglected=goals.filter((g)=>!goalsWithBricks.find((gb)=>gb.id===g.id));

  // Diary entries this week
  const weekDiary=diary.filter((e)=>last7.some((d)=>d.key===e.date));

  // Best and worst day
  const sorted=[...last7].sort((a,b)=>b.pct-a.pct);
  const bestDay=sorted[0];
  const worstDay=sorted[sorted.length-1];

  const isSunday=new Date().getDay()===0;

  const runAI=async()=>{
    setLoading(true); setAiReview(null);
    const habitSummary=last7.map((d)=>`${d.dayName}: ${d.done}/${d.total} (${d.pct}%)`).join(", ");
    const goalsAdvanced=goalsWithBricks.map((g)=>`${g.title} (${goalProgress[g.id]||0}%)`).join(", ")||"nenhuma";
    const goalsStalled=goalsNeglected.map((g)=>g.title).join(", ")||"nenhuma";
    const diaryMoods=weekDiary.map((e)=>e.mood).join(", ")||"sem registros";
    const diaryReflections=weekDiary.map((e)=>e.text||e.gratitude).filter(Boolean).join(" | ")||"sem reflexões";
    const intentions=weekDiary.map((e)=>e.intention).filter(Boolean).join(" | ")||"sem intenções registradas";

    const prompt=`Você é um coach de vida cristão — prático, encorajador, direto. Faça uma revisão semanal em português baseada nos dados abaixo.

Estrutura obrigatória:
1. BALANÇO DA SEMANA (2-3 linhas honestas)
2. PONTOS DE LUZ (o que foi bem)
3. ÁREAS DE ATENÇÃO (sem julgamento, só clareza)
4. PADRÃO IDENTIFICADO (algo que os dados revelam)
5. FOCO DA PRÓXIMA SEMANA (1 prioridade clara + 3 ações)
6. PALAVRA DE ENCORAJAMENTO (1 versículo ou princípio)

Seja como um mentor que conhece o Rafael de verdade. Use os dados, não generalize.

DADOS DA SEMANA:
Consistência por dia: ${habitSummary}
Total: ${weekDone}/${weekTarget} hábitos (${weekPct}%)
Dias perfeitos: ${perfectDays} | Dias zerados: ${zeroDays}
Sequência atual: ${streak.count} dias
Metas que avançaram: ${goalsAdvanced}
Metas negligenciadas: ${goalsStalled}
Humor da semana: ${diaryMoods}
Reflexões: ${diaryReflections}
Intenções registradas: ${intentions}`;

    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1200,messages:[{role:"user",content:prompt}]}),
      });
      const data=await res.json();
      setAiReview(data.content?.find((b)=>b.type==="text")?.text||"Erro ao gerar revisão.");
    }catch{ setAiReview("Erro de conexão. Tente novamente."); }
    setLoading(false);
  };

  const maxBar=60;

  return(
    <div style={{paddingBottom:90}}>
      <div style={{padding:"28px 20px 16px"}}>
        <p style={{fontSize:12,color:T.gold,margin:0,fontWeight:700,letterSpacing:"0.08em"}}>
          {isSunday?"🗓 HOJE É DOMINGO — DIA DE REVISÃO":"REVISÃO SEMANAL"}
        </p>
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:T.text,margin:"4px 0 0"}}>
          Como foi sua semana?
        </h2>
        <p style={{fontSize:13,color:T.textSub,margin:"6px 0 0"}}>
          {new Date(last7[0].key+"T12:00:00").toLocaleDateString("pt-BR",{day:"numeric",month:"short"})} — {new Date(last7[6].key+"T12:00:00").toLocaleDateString("pt-BR",{day:"numeric",month:"short"})}
        </p>
      </div>

      {/* Week consistency bar chart */}
      <div style={{margin:"0 12px 12px",background:T.surface,borderRadius:16,padding:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <p style={{margin:0,fontSize:12,fontWeight:700,color:T.textSub,letterSpacing:"0.1em",textTransform:"uppercase"}}>Consistência</p>
          <span style={{fontSize:18,fontWeight:700,color:weekPct>=70?T.gold:T.textSub}}>{weekPct}%</span>
        </div>
        <div style={{display:"flex",alignItems:"flex-end",gap:6,height:maxBar+24}}>
          {last7.map((d)=>{
            const barH=Math.max((d.pct/100)*maxBar,4);
            const isToday=d.key===todayKey;
            const color=d.pct>=80?T.gold:d.pct>=50?T.goldDim:T.surfaceHigh;
            return(
              <div key={d.key} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <span style={{fontSize:9,color:d.pct>=80?T.gold:T.textMuted}}>{d.pct>0?`${d.pct}%`:""}</span>
                <div style={{width:"100%",height:barH,borderRadius:"4px 4px 0 0",background:color,border:isToday?`1px solid ${T.gold}`:"none",transition:"height 0.5s"}}/>
                <span style={{fontSize:10,color:isToday?T.gold:T.textMuted,fontWeight:isToday?700:400}}>{d.dayName}</span>
              </div>
            );
          })}
        </div>
      </div>

      {/* KPI cards */}
      <div style={{margin:"0 12px 12px",display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}}>
        {[
          {label:"Hábitos feitos",  val:`${weekDone}/${weekTarget}`, color:T.gold},
          {label:"Dias perfeitos",  val:`${perfectDays} dias 🔥`,    color:T.success},
          {label:"Dias zerados",    val:`${zeroDays} dias`,          color:zeroDays>2?T.danger:T.textSub},
          {label:"Sequência",       val:`${streak.count} dias`,      color:T.sectors.espiritual},
        ].map((k)=>(
          <div key={k.label} style={{background:T.surface,borderRadius:14,padding:14}}>
            <p style={{margin:0,fontSize:22,fontWeight:700,color:k.color}}>{k.val}</p>
            <p style={{margin:"4px 0 0",fontSize:11,color:T.textSub}}>{k.label}</p>
          </div>
        ))}
      </div>

      {/* Melhor e pior dia */}
      <div style={{margin:"0 12px 12px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <div style={{background:T.surface,borderRadius:14,padding:14,borderTop:`3px solid ${T.success}`}}>
          <p style={{margin:"0 0 4px",fontSize:10,fontWeight:700,color:T.success,letterSpacing:"0.08em"}}>MELHOR DIA</p>
          <p style={{margin:0,fontSize:15,fontWeight:700,color:T.text,textTransform:"capitalize"}}>{bestDay.dayName}</p>
          <p style={{margin:"2px 0 0",fontSize:12,color:T.textSub}}>{bestDay.pct}% concluído</p>
        </div>
        <div style={{background:T.surface,borderRadius:14,padding:14,borderTop:`3px solid ${T.surfaceHigh}`}}>
          <p style={{margin:"0 0 4px",fontSize:10,fontWeight:700,color:T.textMuted,letterSpacing:"0.08em"}}>DIA MAIS FRACO</p>
          <p style={{margin:0,fontSize:15,fontWeight:700,color:T.text,textTransform:"capitalize"}}>{worstDay.dayName}</p>
          <p style={{margin:"2px 0 0",fontSize:12,color:T.textSub}}>{worstDay.pct}% concluído</p>
        </div>
      </div>

      {/* Metas que avançaram */}
      <div style={{margin:"0 12px 12px",background:T.surface,borderRadius:14,padding:14}}>
        <p style={{margin:"0 0 12px",fontSize:11,fontWeight:700,color:T.textSub,letterSpacing:"0.1em",textTransform:"uppercase"}}>
          Obras que avançaram
        </p>
        {goalsWithBricks.length===0&&<p style={{fontSize:13,color:T.textMuted}}>Nenhuma meta recebeu tijolos esta semana.</p>}
        {goalsWithBricks.map((g)=>{
          const color=T.sectors[g.sector], pct=goalProgress[g.id]||0;
          return(
            <div key={g.id} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <span style={{fontSize:13,color:T.text,flex:1}}>🧱 {g.title}</span>
                <span style={{fontSize:13,fontWeight:700,color,marginLeft:8}}>{pct}%</span>
              </div>
              <MiniBar pct={pct} color={color} height={4}/>
            </div>
          );
        })}
        {goalsNeglected.length>0&&(
          <div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${T.surfaceHigh}`}}>
            <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.danger,letterSpacing:"0.08em",textTransform:"uppercase"}}>Sem tijolos esta semana</p>
            {goalsNeglected.map((g)=>(
              <p key={g.id} style={{margin:"0 0 4px",fontSize:13,color:T.textMuted}}>◦ {g.title}</p>
            ))}
          </div>
        )}
      </div>

      {/* Diary mood summary */}
      {weekDiary.length>0&&(
        <div style={{margin:"0 12px 12px",background:T.surface,borderRadius:14,padding:14}}>
          <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:T.textSub,letterSpacing:"0.1em",textTransform:"uppercase"}}>
            Diário da semana ({weekDiary.length} entrada{weekDiary.length!==1?"s":""})
          </p>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {weekDiary.map((e)=>{
              const MOOD_MAP={excelente:"🔥",bem:"😊",neutro:"😐",cansado:"😔",dificil:"⛈"};
              return(
                <div key={e.id} style={{background:T.surfaceHigh,borderRadius:10,padding:"6px 10px",display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:16}}>{MOOD_MAP[e.mood]||"😊"}</span>
                  <span style={{fontSize:11,color:T.textSub}}>{new Date(e.date+"T12:00:00").toLocaleDateString("pt-BR",{weekday:"short"})}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* AI Review */}
      <div style={{margin:"0 12px 12px",background:`linear-gradient(135deg,${T.surface},#1E2438)`,borderRadius:16,padding:16,borderTop:`3px solid ${T.gold}`}}>
        <p style={{margin:"0 0 6px",fontSize:12,fontWeight:700,color:T.gold,letterSpacing:"0.08em"}}>✦ REVISÃO COM IA</p>
        <p style={{margin:"0 0 14px",fontSize:13,color:T.textSub,lineHeight:1.5}}>
          A IA analisa toda a semana e entrega um balanço honesto, padrões identificados e o foco certo para a próxima semana.
        </p>
        <Btn onClick={runAI} style={{width:"100%",padding:13}} variant={loading?"ghost":"gold"}>
          {loading?"⏳ Analisando sua semana...":"◉ Gerar Revisão da Semana"}
        </Btn>
      </div>

      {loading&&(
        <div style={{margin:"0 12px 12px",background:T.surface,borderRadius:14,padding:24,textAlign:"center"}}>
          <p style={{fontSize:32,margin:"0 0 10px"}}>🔍</p>
          <p style={{color:T.textSub,fontSize:14}}>Analisando seus 7 dias...</p>
          <p style={{color:T.textMuted,fontSize:12,marginTop:4}}>Hábitos, metas, diário e padrões</p>
        </div>
      )}

      {aiReview&&!loading&&(
        <div style={{margin:"0 12px 12px",background:T.surface,borderRadius:16,padding:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <p style={{margin:0,fontSize:12,fontWeight:700,color:T.gold,letterSpacing:"0.08em"}}>RELATÓRIO DA SEMANA</p>
            <button onClick={()=>setAiReview(null)} style={{background:"none",border:"none",color:T.textMuted,fontSize:12,cursor:"pointer"}}>✕</button>
          </div>
          {aiReview.split("\n").map((line,i)=>{
            const isHeader=/^\d\./.test(line.trim())||/^[A-ZÁÉÍÓÚ\s]{5,}:/.test(line.trim());
            return line.trim()?(
              <p key={i} style={{
                margin:isHeader?"14px 0 5px":"0 0 7px",
                fontSize:isHeader?11:14,
                fontWeight:isHeader?700:400,
                color:isHeader?T.gold:T.text,
                letterSpacing:isHeader?"0.08em":"0",
                textTransform:isHeader?"uppercase":"none",
                lineHeight:1.65,
              }}>{line}</p>
            ):null;
          })}
          <div style={{marginTop:16,paddingTop:12,borderTop:`1px solid ${T.surfaceHigh}`,textAlign:"center"}}>
            <button onClick={runAI} style={{background:"none",border:"none",color:T.textSub,fontSize:12,cursor:"pointer"}}>↻ Atualizar revisão</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── NAV ───────────────────────────────────────────────────────────
const NAV=[
  {id:"home",    icon:"◉", label:"Hoje"},
  {id:"goals",   icon:"◈", label:"Metas"},
  {id:"diary",   icon:"✍", label:"Diário"},
  {id:"health",  icon:"◎", label:"Saúde"},
  {id:"review",  icon:"◇", label:"Semana"},
];
function BottomNav({active,onNavigate}){
  return(
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#13182A",borderTop:`1px solid ${T.surfaceHigh}`,display:"flex",justifyContent:"space-around",padding:"10px 0 20px",zIndex:100}}>
      {NAV.map((item)=>{
        const isActive=active===item.id;
        return(
          <button key={item.id} onClick={()=>onNavigate(item.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 10px"}}>
            <span style={{fontSize:item.id==="library"?16:18,color:isActive?T.gold:T.textMuted,transition:"color 0.2s"}}>{item.icon}</span>
            <span style={{fontSize:9,fontWeight:isActive?700:400,color:isActive?T.gold:T.textMuted,letterSpacing:"0.05em",textTransform:"uppercase",transition:"color 0.2s"}}>{item.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────
function App(){
  const isSunday=new Date().getDay()===0;
  const [page,setPage]=useState(isSunday?"review":"home");
  const PAGES={home:<HomeScreen/>,goals:<GoalsScreen/>,diary:<DiaryScreen/>,health:<HealthScreen/>,review:<WeeklyReviewScreen/>};
  return(
    <AppProvider>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;500;600;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        body{background:${T.bg};font-family:'Inter',sans-serif;color:${T.text};}
        input,select,textarea{font-family:'Inter',sans-serif;color:${T.text};}
        ::-webkit-scrollbar{display:none;}
        select{appearance:none;} option{background:${T.surface};}
        input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.5);}
      `}</style>
      <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:T.bg}}>
        <div style={{overflowY:"auto",height:"100vh"}}>{PAGES[page]}</div>
        <BottomNav active={page} onNavigate={setPage}/>
      </div>
    </AppProvider>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(console.error);
      });
    }
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) { splash.style.opacity = '0'; setTimeout(() => splash.remove(), 500); }
      }, 1500);
    });
  </script>
</body>
